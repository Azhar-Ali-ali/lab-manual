<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Effect Animation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
        }

        #liquid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .content-overlay {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
            pointer-events: none;
        }

        .content-overlay h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .content-overlay p {
            font-size: 1.5rem;
            font-weight: 400;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5);
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Montserrat', serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .controls button.active {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .content-overlay h1 {
                font-size: 2.5rem;
            }
            .content-overlay p {
                font-size: 1rem;
            }
            .controls {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="liquid-canvas"></canvas>
    
    <div class="content-overlay">
        <div>
            <h1><span>liquid background effect</span></h1>
            
        </div>
    </div>

    <div class="controls">
        <button id="toggleRain">Toggle Rain</button>
    </div>

    <script type="module">
        import LiquidBackground from 'https://cdn.jsdelivr.net/npm/threejs-components@0.0.22/build/backgrounds/liquid1.min.js';
        
        const canvas = document.getElementById('liquid-canvas');
        let app = null;
        let rainEnabled = false;

        // Initialize the liquid background
        if (canvas) {
            app = LiquidBackground(canvas);
            
            // Don't load any image - keep it black
            // Configure material properties for a black liquid effect
            app.liquidPlane.material.metalness = 0.75;
            app.liquidPlane.material.roughness = 0.25;
            app.liquidPlane.material.color.setHex(0x000000);
            app.liquidPlane.uniforms.displacementScale.value = 5;
            app.setRain(false);
        }

        // Toggle rain effect
        const toggleRainBtn = document.getElementById('toggleRain');
        toggleRainBtn.addEventListener('click', () => {
            if (app) {
                rainEnabled = !rainEnabled;
                app.setRain(rainEnabled);
                toggleRainBtn.classList.toggle('active', rainEnabled);
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (app && app.dispose) {
                app.dispose();
            }
        });
    </script>
</body>
</html>
